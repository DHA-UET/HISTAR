<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Histar - Bảo tàng Lịch sử Quân Sự Việt Nam</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">

    <script src="./script.js"></script>
</head>

<body>
    <div id="start-screen">
        <h1>Truy Cập Hệ Thống Lịch Sử</h1>
        <p>Hãy thu thập các bản đồ chiến thuật trong Bảo Tàng Lịch Sử Quân Sự Việt Nam để hoàn thành nhiệm vụ.</p>
        <button id="start-btn">Bắt đầu quét bản đồ AR</button>
        <button id="clear-data-btn">Xóa Dữ Liệu (Chơi Lại)</button>
    </div>

    <div id="ui-layer">
        <div id="mission-hud">
            <div id="mission-text">Tiến độ thu thập</div>
            <div id="mission-counter">[ 0 / 10 ]</div>
        </div>
        <div id="toast-msg">Đã tìm thấy chiến dịch mới!</div>
    </div>

    <div id="completion-screen">
        <h1>HOÀN THÀNH CHIẾN DỊCH</h1>
        <p>Bạn đã thu thập đủ 10 hồ sơ mô phỏng không gian.</p>
        <button id="reset-btn">Khởi động lại</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./assets/target.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001;"
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <video id="vid0" src="./assets/video1.mp4" loop playsinline preload="auto"></video>
            <video id="vid1" src="./assets/video2.mp4" loop playsinline preload="auto"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0"
                  map-tracker="targetId: 0; targetName: Ngô Quyền đánh quân Nam Hán (938)"
                  video-handler="video: #vid0">
            <a-plane chromakey-video="src: #vid0; threshold: 0.4" position="0 0 0" height="1" width="1"></a-plane>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1"
                  map-tracker="targetId: 1; targetName: Lý Thường Kiệt đánh phủ đầu nhà Tống"
                  video-handler="video: #vid1">
            <a-plane chromakey-video="src: #vid1; threshold: 0.4" position="0 0 0" height="1" width="1"></a-plane>
        </a-entity>
    </a-scene>
</body>
</html>
